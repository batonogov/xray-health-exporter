name: Релиз

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_short: ${{ steps.version.outputs.version_short }}
    steps:
      - name: Извлечение версии из тега
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # v1.2.3 -> 1.2
          SHORT=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1,2)
          echo "version_short=$SHORT" >> $GITHUB_OUTPUT
          echo "Версия: $VERSION (короткая: $SHORT)"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm

    steps:
      - uses: actions/checkout@v6

      - name: Настройка Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Сборка
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarch == 'arm' && '7' || '' }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ needs.version.outputs.version }}" \
            -o xray-health-exporter-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v6
        with:
          name: xray-health-exporter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xray-health-exporter-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Вход в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка и публикация
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version_short }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [version, build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Скачивание Linux AMD64 бинарника
        uses: actions/download-artifact@v7
        with:
          name: xray-health-exporter-linux-amd64
          path: artifacts/xray-health-exporter-linux-amd64

      - name: Скачивание Linux ARM64 бинарника
        uses: actions/download-artifact@v7
        with:
          name: xray-health-exporter-linux-arm64
          path: artifacts/xray-health-exporter-linux-arm64

      - name: Скачивание Linux ARM бинарника
        uses: actions/download-artifact@v7
        with:
          name: xray-health-exporter-linux-arm
          path: artifacts/xray-health-exporter-linux-arm

      - name: Создание релиза
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: Релиз ${{ needs.version.outputs.version }}
          body: |
            ## Xray Health Exporter ${{ needs.version.outputs.version }}

            Prometheus exporter для мониторинга множественных VLESS туннелей со встроенным Xray-core.

            ### Установка

            **Бинарники:**
            - **Linux x64**: `xray-health-exporter-linux-amd64`
            - **Linux ARM64**: `xray-health-exporter-linux-arm64`
            - **Linux ARM (32-bit)**: `xray-health-exporter-linux-arm`

            ```bash
            # Скачайте и сделайте исполняемым
            chmod +x xray-health-exporter-*

            # Создайте config.yaml
            cat > config.yaml <<EOF
            defaults:
              check_url: "https://www.google.com"
              check_interval: "30s"
              check_timeout: "30s"
            tunnels:
              - name: "Server 1"
                url: "vless://uuid@host:443?..."
            EOF

            # Запустите
            export CONFIG_FILE=./config.yaml
            ./xray-health-exporter-*
            ```

            **Docker:**
            ```bash
            # Создайте config.yaml (см. выше)

            # Запустите
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            docker run --rm \
              -v $(pwd)/config.yaml:/app/config.yaml:ro \
              -p 9273:9273 \
              ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ```

            См. [config.example.yaml](https://github.com/${{ github.repository }}/blob/main/config.example.yaml) для полного примера конфигурации.

            ### Что нового
          files: artifacts/*/xray-health-exporter-*
          generate_release_notes: true

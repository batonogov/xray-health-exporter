name: Релиз

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_short: ${{ steps.version.outputs.version_short }}
      version_major: ${{ steps.version.outputs.version_major }}
    steps:
      - name: Извлечение версии из тега
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          echo "version=$TAG_NAME" >> $GITHUB_OUTPUT
          # v1.2.3 -> v1.2
          SHORT=$(echo "$TAG_NAME" | cut -d. -f1,2)
          echo "version_short=$SHORT" >> $GITHUB_OUTPUT
          # v1.2.3 -> v1
          MAJOR=$(echo "$TAG_NAME" | cut -d. -f1)
          echo "version_major=$MAJOR" >> $GITHUB_OUTPUT
          echo "Версия: $TAG_NAME (короткая: $SHORT, major: $MAJOR)"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Настройка Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"

      - name: Сборка
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarch == 'arm' && '7' || '' }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ needs.version.outputs.version }} -X main.Commit=${{ github.sha }}" \
            -o xray-health-exporter-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/exporter

      - name: Загрузка артефакта
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xray-health-exporter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xray-health-exporter-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Скачивание собранных бинарников
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: xray-health-exporter-linux-*

      - name: Настройка QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Вход в GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка и публикация
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version_short }}
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version_major }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [version, build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Скачивание Linux AMD64 бинарника
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: xray-health-exporter-linux-amd64
          path: artifacts/xray-health-exporter-linux-amd64

      - name: Скачивание Linux ARM64 бинарника
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: xray-health-exporter-linux-arm64
          path: artifacts/xray-health-exporter-linux-arm64

      - name: Скачивание Linux ARM бинарника
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: xray-health-exporter-linux-arm
          path: artifacts/xray-health-exporter-linux-arm

      - name: Обновление релиза
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          append_body: true
          body: |

            ### Установка

            **Бинарники:**
            - **Linux x64**: `xray-health-exporter-linux-amd64`
            - **Linux ARM64**: `xray-health-exporter-linux-arm64`
            - **Linux ARM (32-bit)**: `xray-health-exporter-linux-arm`

            ```bash
            chmod +x xray-health-exporter-*
            export CONFIG_FILE=./config.yaml
            ./xray-health-exporter-linux-amd64
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            docker run --rm \
              -v $(pwd)/config.yaml:/app/config.yaml:ro \
              -p 9273:9273 \
              ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ```

            Туннели можно задавать тремя способами: VLESS URL, нативный Xray JSON-конфиг (`xray_config_file`) и subscription URL.
            См. [config.example.yaml](https://github.com/${{ github.repository }}/blob/main/config.example.yaml) для полного примера конфигурации.
          files: artifacts/*/xray-health-exporter-*

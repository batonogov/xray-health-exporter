version: "3"

tasks:
  build:
    desc: Собрать бинарный файл
    cmds:
      - go build -ldflags="-X main.Version=dev" -o xray-health-exporter .

  test:
    desc: Запустить тесты
    cmds:
      - go test -v -cover ./...

  test-race:
    desc: Запустить тесты с детектором гонок
    cmds:
      - go test -v -race ./...

  test-coverage:
    desc: Запустить тесты с покрытием и сгенерировать отчет
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
      - >
        echo "📊 Для HTML отчета запустите: go tool cover -html=coverage.out"

  coverage-html:
    desc: Открыть HTML отчет о покрытии
    deps: [test-coverage]
    cmds:
      - go tool cover -html=coverage.out

  ci-test:
    desc: Запустить тесты как в CI (с покрытием и race detector)
    cmds:
      - go fmt ./...
      - go build -v -o xray-health-exporter .
      - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -func=coverage.out | tail -1
      - echo "✅ Все проверки CI пройдены!"

  install-hooks:
    desc: Установить git pre-commit хуки
    cmds:
      - pre-commit install
      - echo "✅ Pre-commit хуки установлены!"

  update-deps:
    desc: Обновить все Go зависимости до последних версий
    cmds:
      - go get -u ./...
      - go mod tidy
      - echo "✅ Зависимости обновлены!"

  update-deps-minor:
    desc: Обновить Go зависимости только в пределах минорных версий
    cmds:
      - go get -u=patch ./...
      - go mod tidy
      - echo "✅ Зависимости обновлены (только патчи)!"

  tidy:
    desc: Привести в порядок go.mod и go.sum
    cmds:
      - go mod tidy
      - echo "✅ go.mod приведен в порядок!"

  clean:
    desc: Очистить артефакты сборки
    cmds:
      - rm -f xray-health-exporter coverage.txt

  run:
    desc: Запустить приложение
    cmds:
      - go run .

  docker-build:
    desc: Собрать Docker образ
    cmds:
      - docker build -t xray-health-exporter .

  docker-build-multi:
    desc: Собрать мультиплатформенный Docker образ
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 -t xray-health-exporter .

  docker-run:
    desc: Запустить Docker контейнер
    deps: [docker-build]
    cmds:
      - docker run --rm -v $(pwd)/config.yaml:/app/config.yaml:ro -p 9273:9273 xray-health-exporter
